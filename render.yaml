services:
  - type: web
    name: pcieerd-portal
    runtime: node
    plan: free
    region: singapore
    buildCommand: cp prisma/schema.postgresql.prisma prisma/schema.prisma && bun install && prisma generate && prisma db push --accept-data-loss && next build
    startCommand: next start -p 3000
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BUN_VERSION
        value: "latest"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: "https://pcieerd-portal.onrender.com"
    healthCheckPath: /api/health
